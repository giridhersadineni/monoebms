services:
  app:
    build:
      context: ./docker
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      DB_HOST: db
      DB_PORT: 3306
      REDIS_HOST: redis
    depends_on:
      - db
      - redis
    networks:
      - ebms

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ebms

  db:
    image: mariadb:10.11
    environment:
      MYSQL_DATABASE: ebms
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: ebms
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ebms

  redis:
    image: redis:7-alpine
    networks:
      - ebms

volumes:
  db_data:

networks:
  ebms:
    driver: bridge
