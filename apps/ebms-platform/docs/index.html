<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EBMS Platform — Developer Docs</title>
  <meta name="description" content="Developer documentation for the EBMS Platform — Examination Branch Management System">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --theme-color: #3b82f6;
      --sidebar-width: 280px;
      --sidebar-background: #0f172a;
      --sidebar-nav-link-color: #94a3b8;
      --sidebar-nav-link-color--active: #fff;
      --sidebar-nav-link-background--active: rgba(59,130,246,.15);
      --sidebar-nav-link-border-color--active: #3b82f6;
      --sidebar-name-color: #f1f5f9;
      --sidebar-name-font-size: 1rem;
      --sidebar-name-font-weight: 700;
      --cover-background-color: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      --cover-heading-color: #f8fafc;
      --cover-blockquote-color: #94a3b8;
      --base-font-size: 15px;
      --code-font-size: 13px;
      --base-line-height: 1.75;
      --heading-color: #1e293b;
      --link-color: #3b82f6;
      --blockquote-border-color: #3b82f6;
      --table-cell-border-color: #e2e8f0;
      --table-head-background: #f8fafc;
    }
    .sidebar-nav li a { letter-spacing: 0.01em; }
    .sidebar > h1 { padding: 1.5rem 1rem 0.5rem; }
    .sidebar > h1 a { color: var(--sidebar-name-color) !important; text-decoration: none; }
    .content { padding-top: 2rem; }
    .markdown-section code { background: #f1f5f9; color: #be123c; border-radius: 4px; }
    .markdown-section pre > code { color: inherit; }
    .markdown-section table { display: table; width: 100%; }
    .markdown-section blockquote { border-left: 4px solid var(--theme-color); background: #eff6ff; }
    .app-name-link img { display: block; margin: 0 auto; }
    /* Badge style for labels */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 9999px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div id="app">Loading…</div>

  <script>
    window.$docsify = {
      name: '📋 EBMS Platform',
      repo: '',
      loadSidebar: true,
      loadNavbar: false,
      coverpage: false,
      auto2top: true,
      maxLevel: 3,
      subMaxLevel: 2,
      homepage: 'README.md',
      search: {
        placeholder: 'Search docs…',
        noData: 'No results.',
        depth: 3,
        hideOtherSidebarContent: false,
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied',
      },
      themeColor: '#3b82f6',
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-php.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
</body>
</html>
